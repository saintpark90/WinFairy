name: Sync KBO schedule (Schedule.aspx)

on:
  schedule:
    # KST 14:00~23:30 — 매 30분 (UTC 05:00~15:30, GitHub Actions는 UTC 기준)
    - cron: '0,30 5-15 * * *'
    # KST 익일 01:00 (UTC 16:00)
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Sync schedule to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/fetch_kbo_2026.py
