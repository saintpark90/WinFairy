<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>winfairy</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f7f8fb;
      }
      .boot-message {
        max-width: 640px;
        margin: 48px auto;
        padding: 20px 24px;
        border-radius: 12px;
        background: #fff;
        color: #1f2937;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        line-height: 1.6;
      }
      .boot-message code {
        background: #f3f4f6;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-message">
        <h2>WinFairy 실행 안내</h2>
        <p>
          이 파일을 직접 열면 React/Vite 모듈이 정상 로드되지 않아 화면이 비어 보일 수 있습니다.
        </p>
        <p>
          프로젝트 폴더에서 <code>npm install</code> 후 <code>npm run dev</code>로 실행해 주세요.
        </p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
